name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dev tools
        run: pip install flake8 black isort bandit

      - name: flake8
        run: flake8 app/ --max-line-length=100 --exclude=app/myapp/migrations,app/staticfiles

      - name: black
        run: black --check --diff app/

      - name: isort
        run: isort --check-only --diff app/

      - name: bandit (security scan — skip tests file)
        run: bandit -r app/myapp/ -ll --exclude app/myapp/tests.py

  test:
    name: "Tests + Coverage"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       test_myapp
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements-dev.txt

      - name: Migrate + test
        env:
          DJANGO_SETTINGS_MODULE: myapp.settings
          DJANGO_SECRET_KEY:      pr-check-secret-key
          DB_NAME:                test_myapp
          DB_USER:                postgres
          DB_PASSWORD:            postgres
          DB_HOST:                localhost
          DB_PORT:                "5432"
        run: |
          cd app
          python manage.py migrate --noinput
          coverage run manage.py test myapp --verbosity=2
          coverage report --fail-under=80
          coverage xml -o coverage.xml

      - name: Post coverage summary to PR
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_DATA_FILE: app/coverage.xml
        continue-on-error: true  # don't fail the job if comment posting fails

  docker-build:
    name: "Docker build check (no push)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context:    ./app
          target:     production
          push:       false
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags:       orbital:pr-${{ github.event.pull_request.number }}
