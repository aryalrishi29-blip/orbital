name: DevSecOps Security Scans

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly full scan every Monday 06:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write  # required for Cosign OIDC keyless signing

jobs:
  # ────────────── 1. Dependency scan ──────────────
  dependency-scan:
    name: Dependency scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: |
          cd app
          pip-audit -r requirements.txt \
            --format json \
            --output pip-audit-report.json \
            --desc || true
      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: app/pip-audit-report.json
          retention-days: 30

  # ────────────── 2. SAST (Semgrep) ──────────────
  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep \
            --config "p/django" \
            --config "p/python" \
            --config "p/secrets" \
            --config "p/owasp-top-ten" \
            --sarif \
            --output semgrep.sarif \
            --no-error \
            --severity ERROR \
            --exclude "app/myapp/migrations" \
            app/
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ────────────── 3. Secret scan (Gitleaks) ──────────────
  secret-scan:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ────────────── 4. Container scan (Trivy) ──────────────
  container-scan:
    name: Container scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          IMAGE=orbital:scan
          docker build --target production -t $IMAGE ./app
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: orbital:scan
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

  # ────────────── 5. Dockerfile lint (Hadolint) ──────────────
  dockerfile-lint:
    name: Dockerfile lint (Hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          format: sarif
          output-file: hadolint.sarif
          no-fail: true           # Do not fail for warnings
          failure-threshold: error # Fail only on errors
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint.sarif
          category: hadolint

  # ────────────── 6. Kubernetes manifest scan (Kubescape) ──────────────
  k8s-security:
    name: K8s manifest scan (Kubescape)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Kubescape
        uses: kubescape/github-action@main
        with:
          files: k8s/
          frameworks: NSA,MITRE
          failedThreshold: 50
          format: sarif
          outputFile: kubescape.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: kubescape.sarif
          category: kubescape

  # ────────────── 7. Image signing (Cosign) ──────────────
  sign-image:
    name: Sign image (Cosign)
    runs-on: ubuntu-latest
    needs: [container-scan, dockerfile-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and tag image
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/orbital:${{ github.sha }}
          docker build --target production -t $IMAGE ./app
          docker push $IMAGE
      - name: Sign the image (keyless OIDC)
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/orbital:${{ github.sha }}
          cosign sign --yes $IMAGE
      - name: Verify signature
        run: |
          IMAGE=${{ steps.login-ecr.outputs.registry }}/orbital:${{ github.sha }}
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            $IMAGE