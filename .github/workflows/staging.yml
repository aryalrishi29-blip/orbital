name: Staging Deploy

# Deploys the `develop` branch to a staging environment automatically.
# Production deploy (ci-cd.yml) is a separate workflow that requires
# a green staging run + manual approval.

on:
  push:
    branches: [develop]

env:
  AWS_REGION:     us-east-1
  ECR_REPOSITORY: orbital
  IMAGE_TAG:      ${{ github.sha }}

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       test_myapp
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt
      - run: cd app && pip install -r requirements-dev.txt
      - name: Migrate + test
        env:
          DJANGO_SETTINGS_MODULE: myapp.settings
          DJANGO_SECRET_KEY:      staging-ci-key
          DB_NAME:                test_myapp
          DB_USER:                postgres
          DB_PASSWORD:            postgres
          DB_HOST:                localhost
          DB_PORT:                "5432"
        run: |
          cd app
          python manage.py migrate --noinput
          coverage run manage.py test myapp --verbosity=2
          coverage report --fail-under=80

  build-and-push:
    name: "Build & Push (staging tag)"
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:staging-$IMAGE_TAG"
          STAGING_LATEST="$REGISTRY/$ECR_REPOSITORY:staging-latest"

          docker buildx build \
            --platform linux/amd64 \
            --target production \
            --tag  "$IMAGE_URI" \
            --tag  "$STAGING_LATEST" \
            --cache-from "type=registry,ref=$STAGING_LATEST" \
            --cache-to   "type=inline" \
            --push \
            ./app

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: "Deploy → Staging"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging    # No approval gate — auto-deploys on develop push

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: SSH deploy to staging EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_URI:         ${{ needs.build-and-push.outputs.image_uri }}
          ECR_REGISTRY:      ${{ steps.login-ecr.outputs.registry }}
          AWS_REGION:        ${{ env.AWS_REGION }}
          DJANGO_SECRET_KEY: ${{ secrets.STAGING_DJANGO_SECRET_KEY }}
          ALLOWED_HOSTS:     ${{ secrets.STAGING_ALLOWED_HOSTS }}
          DB_NAME:           ${{ secrets.STAGING_DB_NAME }}
          DB_USER:           ${{ secrets.STAGING_DB_USER }}
          DB_PASSWORD:       ${{ secrets.STAGING_DB_PASSWORD }}
          DB_HOST:           ${{ secrets.STAGING_DB_HOST }}
          DB_PORT:           "5432"
        with:
          host:     ${{ secrets.STAGING_EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs:     IMAGE_URI,ECR_REGISTRY,AWS_REGION,DJANGO_SECRET_KEY,ALLOWED_HOSTS,DB_NAME,DB_USER,DB_PASSWORD,DB_HOST,DB_PORT
          script: |
            set -euo pipefail
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            docker pull "$IMAGE_URI"
            docker run --rm \
              -e DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" \
              -e DB_NAME="$DB_NAME" -e DB_USER="$DB_USER" \
              -e DB_PASSWORD="$DB_PASSWORD" -e DB_HOST="$DB_HOST" -e DB_PORT="$DB_PORT" \
              "$IMAGE_URI" python manage.py migrate --noinput
            docker stop  orbital-staging 2>/dev/null || true
            docker rm    orbital-staging 2>/dev/null || true
            docker run --detach \
              --name    orbital-staging \
              --restart unless-stopped \
              --publish 8001:8000 \
              -e DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" \
              -e ALLOWED_HOSTS="$ALLOWED_HOSTS" \
              -e DB_NAME="$DB_NAME" -e DB_USER="$DB_USER" \
              -e DB_PASSWORD="$DB_PASSWORD" -e DB_HOST="$DB_HOST" -e DB_PORT="$DB_PORT" \
              "$IMAGE_URI"
            sleep 5
            docker exec orbital-staging \
              wget -qO- http://localhost:8000/health/ | python3 -c \
              "import sys,json; s=json.load(sys.stdin).get('status',''); sys.exit(0 if s=='healthy' else 1)"
            echo "✅ Staging deploy complete: $IMAGE_URI"

      - name: Staging summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Staging deploy succeeded" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Branch**: \`develop\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Image**: \`${{ needs.build-and-push.outputs.image_uri }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Commit**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Staging looks good? Open a PR from \`develop\` → \`main\` to promote to production." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Staging deploy failed" >> "$GITHUB_STEP_SUMMARY"
          fi
