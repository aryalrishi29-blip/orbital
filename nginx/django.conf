# Nginx reverse proxy configuration for the Django/Gunicorn container.
# Place this file at /etc/nginx/conf.d/django.conf on the EC2 host.
# Nginx → port 80/443 → Gunicorn on 127.0.0.1:8000

upstream orbital {
    server 127.0.0.1:8000;
    keepalive 32;
}

# Redirect all HTTP → HTTPS
server {
    listen      80;
    server_name _;
    return      301 https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name your-domain.com;   # ← replace with your domain

    # ── TLS ─────────────────────────────────────────────────
    # Certificates managed by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── Static files (served directly, cached 30 days) ───────
    location /static/ {
        alias   /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check (no access log noise) ───────────────────
    location = /health/ {
        proxy_pass         http://orbital;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── All other requests → Gunicorn ────────────────────────
    location / {
        proxy_pass             http://orbital;
        proxy_http_version     1.1;
        proxy_set_header       Connection      "";
        proxy_set_header       Host            $host;
        proxy_set_header       X-Real-IP       $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_connect_timeout  30s;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;
    }

    # ── Deny hidden files (.env, .git, etc.) ─────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
