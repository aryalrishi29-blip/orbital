apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orbital

bases:
  - ../../base

# Production-specific patches
patches:
  # Scale to 5 replicas in production
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
    target:
      kind: Deployment
      name: orbital

  # Higher resource limits in production
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
    target:
      kind: Deployment
      name: orbital

  # Production HPA — scale up to 20 pods
  - patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 20
    target:
      kind: HorizontalPodAutoscaler
      name: orbital

images:
  - name: REPLACE_WITH_ECR_IMAGE
    newName: REPLACE_WITH_ECR_REGISTRY/orbital
    newTag:  latest                 # CI updates this to the exact SHA
