apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: orbital-staging

bases:
  - ../../base

patches:
  # Staging: 2 replicas is enough
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: orbital

  # Reduced limits for staging (smaller nodes)
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
    target:
      kind: Deployment
      name: orbital

images:
  - name: REPLACE_WITH_ECR_IMAGE
    newName: REPLACE_WITH_ECR_REGISTRY/orbital
    newTag:  staging-latest
