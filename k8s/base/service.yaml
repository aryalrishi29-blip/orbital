apiVersion: v1
kind: Service
metadata:
  name: orbital
  namespace: orbital
  labels:
    app: orbital
spec:
  selector:
    app: orbital
  ports:
    - name:       http
      port:       80
      targetPort: 8000
      protocol:   TCP
  type: ClusterIP   # Nginx Ingress (below) handles external traffic
---
# Preview service for blue-green — ArgoCD Rollouts switches
# the active service between blue and green ReplicaSets.
apiVersion: v1
kind: Service
metadata:
  name: orbital-preview
  namespace: orbital
  labels:
    app: orbital
spec:
  selector:
    app: orbital
  ports:
    - name:       http
      port:       80
      targetPort: 8000
  type: ClusterIP
