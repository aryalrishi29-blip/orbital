# This file is a TEMPLATE — actual values are injected by the CI pipeline
# using `kubectl create secret` or Sealed Secrets / External Secrets Operator.
# NEVER commit real secret values to Git.
#
# Create manually:
#   kubectl create secret generic django-secrets \
#     --namespace orbital \
#     --from-literal=DJANGO_SECRET_KEY="..." \
#     --from-literal=ALLOWED_HOSTS="your-domain.com" \
#     --from-literal=DB_NAME="myapp" \
#     --from-literal=DB_USER="postgres" \
#     --from-literal=DB_PASSWORD="..." \
#     --from-literal=DB_HOST="your-rds-endpoint.rds.amazonaws.com" \
#     --from-literal=DB_PORT="5432" \
#     --dry-run=client -o yaml | kubeseal > k8s/base/sealed-secret.yaml
#
# Or use External Secrets Operator to pull from AWS Secrets Manager:
#   see k8s/base/external-secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: orbital-secrets
  namespace: orbital
  annotations:
    # Remind operators this is a template
    note: "Managed by CI — do not edit manually"
type: Opaque
stringData:
  DJANGO_SECRET_KEY: PLACEHOLDER
  ALLOWED_HOSTS:     PLACEHOLDER
  DB_NAME:           PLACEHOLDER
  DB_USER:           PLACEHOLDER
  DB_PASSWORD:       PLACEHOLDER
  DB_HOST:           PLACEHOLDER
  DB_PORT:           "5432"
