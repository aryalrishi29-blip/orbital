# ServiceMonitor — tells the Prometheus Operator to scrape /metrics/
# from every pod matching app=orbital in the orbital namespace.
#
# django-prometheus exposes these metrics automatically:
#   django_http_requests_total          (by method, view, status)
#   django_http_requests_latency_seconds (histogram — p50/p95/p99)
#   django_db_execute_total             (DB query counts)
#   django_db_execute_latency_seconds   (DB query latency)
#   python_gc_objects_collected_total   (GC pressure)
#   process_resident_memory_bytes       (pod memory)

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: orbital
  namespace: orbital
  labels:
    # This label is required for kube-prometheus-stack to discover the monitor
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: orbital
  endpoints:
    - port:     http
      path:     /metrics/
      interval: 15s
      # Scrape timeout must be < interval
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - orbital
