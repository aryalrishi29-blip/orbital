# Jaeger — distributed tracing backend.
#
# This manifest deploys Jaeger All-in-One (collector + query + UI in one pod).
# Suitable for staging and demo environments.
#
# For production: use the Jaeger Operator with Elasticsearch backend:
#   helm repo add jaegertracing https://jaegertracing.github.io/helm-charts
#   helm install jaeger jaegertracing/jaeger \
#     --namespace tracing \
#     --set provisionDataStore.cassandra=false \
#     --set provisionDataStore.elasticsearch=true \
#     --set storage.type=elasticsearch

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: tracing
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "14269"
        prometheus.io/path:   "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser:    10001
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.55
          args:
            - "--memory.max-traces=50000"        # keep last 50k traces in memory
            - "--query.base-path=/jaeger"        # UI served at /jaeger
            - "--prometheus.server-url=http://kube-prometheus-stack-prometheus.observability:9090"
          ports:
            - containerPort: 4317    # OTLP gRPC (receives from OTel collector)
              name: otlp-grpc
            - containerPort: 4318    # OTLP HTTP
              name: otlp-http
            - containerPort: 16686   # Jaeger UI
              name: ui
            - containerPort: 14269   # Prometheus metrics
              name: metrics
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 1Gi  }
          env:
            - name: SPAN_STORAGE_TYPE
              value: memory
          readinessProbe:
            httpGet: { path: /jaeger/, port: 16686 }
            initialDelaySeconds: 5
            periodSeconds:       10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   false    # Jaeger needs to write tmp files
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: tracing
spec:
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: tracing
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
---
# Expose Jaeger UI via the existing Nginx Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-ui
  namespace: tracing
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Require internal auth to access Jaeger UI (basic auth or OAuth2 proxy)
    nginx.ingress.kubernetes.io/auth-type:   basic
    nginx.ingress.kubernetes.io/auth-secret: jaeger-basic-auth
    nginx.ingress.kubernetes.io/auth-realm:  "Jaeger — Orbital Platform"
spec:
  tls:
    - hosts: [jaeger.your-domain.com]
      secretName: jaeger-tls
  rules:
    - host: jaeger.your-domain.com     # ← replace
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger-query
                port:
                  number: 16686
